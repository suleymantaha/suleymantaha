name: README Stats Güncelle

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 */6 * * *"  # Her 6 saatte bir
  workflow_dispatch:  # Manuel tetikleme

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Stats kartı oluştur
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=suleymantaha&show_icons=true&theme=transparent&hide_border=true&title_color=F70202&icon_color=43FFA2&text_color=A0A0A0&include_all_commits=true&count_private=true
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Top Languages kartı oluştur
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=suleymantaha&layout=compact&theme=transparent&hide_border=true&title_color=F70202&text_color=A0A0A0&langs_count=8
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Flutter Quiz App pin kartı
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=suleymantaha&repo=flutter_quiz_app&theme=transparent&hide_border=true&title_color=F70202&icon_color=43FFA2
          path: profile/pin-flutter_quiz_app.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Translator App pin kartı
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=suleymantaha&repo=translatorapp&theme=transparent&hide_border=true&title_color=F70202&icon_color=43FFA2
          path: profile/pin-translatorapp.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Trophy indir
        run: |
          mkdir -p profile
          curl -s "https://github-profile-trophy.vercel.app/?username=suleymantaha&theme=darkhub&no-frame=true&no-bg=true&margin-w=4&title_color=F70202&icon_color=43FFA2&text_color=A0A0A0" -o profile/trophy.svg

      - name: Streak indir
        run: |
          curl -s "https://streak-stats.demolab.com?user=suleymantaha&theme=transparent&hide_border=true&title_color=F70202&ring=F70202&fire=F70202&currStreakLabel=43FFA2&text_color=A0A0A0" -o profile/streak.svg

      - name: Activity graph indir
        run: |
          curl -s "https://github-readme-activity-graph.vercel.app/graph?username=suleymantaha&theme=react-dark&hide_border=true&area=true&color=F70202&line=43FFA2&point=A0A0A0&custom_title=Son+31+Gün+Katkılarım" -o profile/activity.svg

      - name: Değişiklikleri commit et
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git diff --staged --quiet || git commit -m "chore: README stats güncellendi"
          git push
